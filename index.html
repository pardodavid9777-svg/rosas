<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: #fff;
}
canvas { display: block; }

/* TEXTO (CAMBIADO COMO PEDISTE) */
.greeting {
    position: absolute;
    top: 30px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 20;
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #FFE55C, #FFB347);
    -webkit-background-clip: text;
    color: transparent;
}

.greeting small {
    display: block;
    font-size: 1.2rem;
    color: #FFD966;
}
</style>
</head>

<body>

<div class="greeting">
🌷 Tal vez no sean reales 🌷
<small>pero te mereces esto y mucho más mi ciega 💖</small>
</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020210);
scene.fog = new THREE.FogExp2(0x020210, 0.03);

// CAMARA
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(10, 5, 15);

// RENDER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLES
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;

// 🌻 TEXTURA DE FLOR
const canvas = document.createElement('canvas');
canvas.width = 128;
canvas.height = 128;
const ctx = canvas.getContext('2d');

for(let i=0;i<10;i++){
    const ang = i * Math.PI * 2 / 10;
    ctx.beginPath();
    ctx.ellipse(64 + Math.cos(ang)*30, 64 + Math.sin(ang)*30, 15, 25, ang, 0, Math.PI*2);
    ctx.fillStyle = "#FFD700";
    ctx.fill();
}
ctx.beginPath();
ctx.arc(64,64,15,0,Math.PI*2);
ctx.fillStyle = "#8B4513";
ctx.fill();

const texture = new THREE.CanvasTexture(canvas);

// 🌌 GALAXIA DE FLORES
const count = 12000;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count * 3);

for(let i=0;i<count;i++){
    const r = Math.random()*20;
    const a = r * 0.5;
    pos[i*3] = Math.cos(a)*r;
    pos[i*3+1] = (Math.random()-0.5)*5;
    pos[i*3+2] = Math.sin(a)*r;
}

geo.setAttribute('position', new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({
    size: 0.9,
    map: texture,
    transparent: true,
    alphaTest: 0.5,
    blending: THREE.AdditiveBlending
});

const galaxy = new THREE.Points(geo, mat);
scene.add(galaxy);

// ✨ ESTRELLAS
const starsGeo = new THREE.BufferGeometry();
const starPos = [];

for(let i=0;i<4000;i++){
    starPos.push(
        (Math.random()-0.5)*100,
        (Math.random()-0.5)*100,
        (Math.random()-0.5)*100
    );
}

starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));

const stars = new THREE.Points(
    starsGeo,
    new THREE.PointsMaterial({color:0xffffff,size:0.2})
);

scene.add(stars);

// LUZ
const light = new THREE.PointLight(0xffaa55, 1);
light.position.set(5,5,5);
scene.add(light);

// 🔥 ANIMACION
function animate(){
    requestAnimationFrame(animate);

    galaxy.rotation.y += 0.002;
    galaxy.rotation.x += 0.0003;

    controls.update();
    renderer.render(scene,camera);
}
animate();

// RESPONSIVE
window.addEventListener("resize",()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
